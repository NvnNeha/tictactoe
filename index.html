<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="scoreboard">
            <div class="score score-x">
                <span class="score-label">Player X</span>
                <span class="score-value" id="scoreX">0</span>
            </div>
            <div class="score score-draw">
                <span class="score-label">Draws</span>
                <span class="score-value" id="scoreDraw">0</span>
            </div>
            <div class="score score-o">
                <span class="score-label">Player O</span>
                <span class="score-value" id="scoreO">0</span>
            </div>
        </div>
        <div class="status" id="status">Player X's turn</div>
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div class="button-group">
            <button class="restart-btn" id="restartBtn">Restart Round</button>
            <button class="reset-btn" id="resetScoreBtn">Reset Scores</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
